<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Parchment background -->
  <circle cx="16" cy="16" r="15" fill="#ede3d0"/>
  <!-- Gold outer ring -->
  <circle cx="16" cy="16" r="15" fill="none" stroke="#a0833f" stroke-width="1.2"/>
  <!-- Globe outline -->
  <circle cx="16" cy="16" r="11.5" fill="none" stroke="#a23b2e" stroke-width="1.2"/>
  <!-- Equator -->
  <line x1="4.5" y1="16" x2="27.5" y2="16" stroke="#a23b2e" stroke-width="1"/>
  <!-- Central meridian -->
  <ellipse cx="16" cy="16" rx="4.5" ry="11.5" fill="none" stroke="#a23b2e" stroke-width="1"/>
  <!-- Upper tropic arc -->
  <path d="M 7.2 10.5 Q 16 13 24.8 10.5" fill="none" stroke="#a0833f" stroke-width="0.9"/>
  <!-- Lower tropic arc -->
  <path d="M 7.2 21.5 Q 16 19 24.8 21.5" fill="none" stroke="#a0833f" stroke-width="0.9"/>
</svg>
